key: local
title: Local Database
description: Built-in local authentication for Kiki
author: Kiki
logo: /_assets/icons/ultraviolet-data-protection.svg
icon: /_assets/icons/ultraviolet-data-protection.svg
color: primary
vendor: 'Kiki'
website: 'https://kiki.gdfm.sg'
isAvailable: true
useForm: true
usernameType: email
props:
  enforceTfa:
    type: Boolean
    title: Enforce Two-Factor Authentication
    hint: Users will be required to setup 2FA the first time they login and cannot be disabled by the user.
    icon: pin-pad
    default: false
  emailValidation:
    type: Boolean
    title: Email Validation
    hint: Send a verification email to the user with a validation link when registering (if registration is enabled).
    icon: received
    default: true
