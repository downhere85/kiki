# ===============================================
# COMMENT
# ===============================================

extend type Query {
  commentsProviders: [CommentProvider]

  comments(
    locale: String!
    path: String!
  ): [CommentPost]!

  commentById(
    id: UUID!
  ): CommentPost
}

extend type Mutation {
  updateCommentsProviders(
    providers: [CommentProviderInput]
  ): DefaultResponse

  createComment(
    pageId: UUID!
    replyTo: UUID
    content: String!
    guestName: String
    guestEmail: String
  ): CommentCreateResponse  @rateLimit(limit: 1, duration: 15)

  updateComment(
    id: UUID!
    content: String!
  ): CommentUpdateResponse

  deleteComment(
    id: UUID!
  ): DefaultResponse
}

# -----------------------------------------------
# TYPES
# -----------------------------------------------

type CommentProvider {
  isEnabled: Boolean
  key: String
  title: String
  description: String
  logo: String
  website: String
  isAvailable: Boolean
  config: [KeyValuePair]
}

input CommentProviderInput {
  isEnabled: Boolean!
  key: String!
  config: [KeyValuePairInput]
}

type CommentPost {
  id: UUID
  content: String
  render: String
  authorId: UUID
  authorName: String
  authorEmail: String
  authorIP: String
  createdAt: Date
  updatedAt: Date
}

type CommentCreateResponse {
  operation: Operation
  id: UUID
}

type CommentUpdateResponse {
  operation: Operation
  render: String
}
